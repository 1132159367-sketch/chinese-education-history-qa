<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国古代教育史问答机器人</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        /* 消息气泡动画 */
        .message-bubble {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 打字机效果光标 */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 加载动画 */
        .loading-dots {
            animation: loadingDots 1.5s infinite;
        }
        @keyframes loadingDots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* 来源标签样式 */
        .source-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">
    <!-- 左侧边栏 -->
    <div class="w-64 bg-gradient-to-b from-blue-900 to-blue-800 text-white flex flex-col shadow-xl">
        <!-- Logo区域 -->
        <div class="p-6 border-b border-blue-700">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-book-open"></i>
                教育史问答
            </h1>
            <p class="text-blue-200 text-sm mt-1">中国古代教育史专业辅导</p>
        </div>

        <!-- 新建对话按钮 -->
        <div class="p-4">
            <button onclick="createNewChat()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-md">
                <i class="fas fa-plus"></i>
                新建对话
            </button>
        </div>

        <!-- 对话历史列表 -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-2">
            <div class="text-blue-200 text-xs uppercase tracking-wider mb-2 px-2">历史对话</div>
            <div id="conversationList" class="space-y-1">
                <!-- 对话列表项将动态添加 -->
            </div>
        </div>

        <!-- 知识库管理区域 -->
        <div class="p-4 border-t border-blue-700">
            <div class="text-blue-200 text-xs uppercase tracking-wider mb-2">知识库管理</div>
            <div class="space-y-2">
                <button onclick="showUploadModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition duration-200 text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-upload"></i>
                    上传PDF
                </button>
                <button onclick="showPDFList()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition duration-200 text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-file-pdf"></i>
                    查看文件
                </button>
                <button onclick="initKnowledgeBase()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-lg transition duration-200 text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-database"></i>
                    初始化知识库
                </button>
            </div>
        </div>

        <!-- 系统状态 -->
        <div class="p-4 border-t border-blue-700 text-xs text-blue-200">
            <div class="flex items-center gap-2">
                <div id="statusIndicator" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="statusText">未连接</span>
            </div>
        </div>
    </div>

    <!-- 右侧聊天区域 -->
    <div class="flex-1 flex flex-col">
        <!-- 顶部标题栏 -->
        <div class="bg-white shadow-md px-6 py-4 flex items-center justify-between">
            <h2 id="chatTitle" class="text-xl font-semibold text-gray-800">新对话</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500">
                    <i class="fas fa-robot mr-1"></i>
                    考研辅导老师
                </span>
            </div>
        </div>

        <!-- 消息展示区域 -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto custom-scrollbar p-6 bg-gray-50">
            <!-- 欢迎消息 -->
            <div class="flex justify-center mb-8">
                <div class="bg-white rounded-xl shadow-lg p-8 max-w-2xl">
                    <div class="text-center mb-6">
                        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-graduation-cap text-blue-600 text-2xl"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-800 mb-2">欢迎来到中国古代教育史问答机器人</h3>
                        <p class="text-gray-600">我是您的专业考研辅导老师，专注于中国古代教育史领域</p>
                    </div>
                    <div class="bg-blue-50 rounded-lg p-4 mb-4">
                        <h4 class="font-semibold text-blue-800 mb-2">使用说明：</h4>
                        <ol class="text-sm text-blue-700 space-y-1">
                            <li>1. 首先上传关于中国古代教育史的PDF文件</li>
                            <li>2. 点击"初始化知识库"建立索引</li>
                            <li>3. 开始提问，获取专业解答</li>
                        </ol>
                    </div>
                    <div class="text-sm text-gray-500">
                        <i class="fas fa-info-circle mr-1"></i>
                        系统严格基于知识库内容回答，确保答案准确可靠
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="bg-white border-t border-gray-200 p-4">
            <div class="max-w-4xl mx-auto">
                <div class="flex gap-3">
                    <textarea
                        id="messageInput"
                        placeholder="请输入您的问题..."
                        class="flex-1 border border-gray-300 rounded-lg px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent custom-scrollbar"
                        rows="3"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button
                        onclick="sendMessage()"
                        id="sendButton"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2 self-end disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <i class="fas fa-paper-plane"></i>
                        发送
                    </button>
                </div>
                <div class="text-xs text-gray-400 mt-2 text-center">
                    按 Enter 发送，Shift + Enter 换行
                </div>
            </div>
        </div>
    </div>

    <!-- PDF上传模态框 -->
    <div id="uploadModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4">
            <div class="p-6 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fas fa-upload text-blue-600"></i>
                    上传PDF文件
                </h3>
            </div>
            <div class="p-6">
                <div
                    id="dropZone"
                    class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-500 transition duration-200 cursor-pointer"
                    ondrop="handleDrop(event)"
                    ondragover="handleDragOver(event)"
                    ondragleave="handleDragLeave(event)"
                    onclick="document.getElementById('fileInput').click()"
                >
                    <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i>
                    <p class="text-gray-600 mb-2">拖拽PDF文件到此处</p>
                    <p class="text-gray-400 text-sm">或点击选择文件</p>
                    <input type="file" id="fileInput" accept=".pdf" class="hidden" onchange="handleFileSelect(event)">
                </div>
                <div id="uploadStatus" class="mt-4 text-sm text-gray-600"></div>
            </div>
            <div class="p-6 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="hideUploadModal()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg transition duration-200">
                    取消
                </button>
                <button onclick="uploadPDF()" id="uploadButton" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition duration-200 disabled:opacity-50" disabled>
                    上传
                </button>
            </div>
        </div>
    </div>

    <!-- PDF列表模态框 -->
    <div id="pdfListModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 max-h-[80vh]">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fas fa-file-pdf text-blue-600"></i>
                    知识库文件列表
                </h3>
                <button onclick="hidePDFList()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar" style="max-height: calc(80vh - 140px)">
                <div id="pdfList" class="space-y-3">
                    <!-- PDF列表将动态添加 -->
                </div>
            </div>
            <div class="p-6 border-t border-gray-200 flex justify-end">
                <button onclick="hidePDFList()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition duration-200">
                    关闭
                </button>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div id="notification" class="fixed top-4 right-4 hidden z-50">
        <div class="bg-white rounded-lg shadow-lg p-4 max-w-sm">
            <div class="flex items-center gap-3">
                <i id="notificationIcon" class="fas fa-info-circle text-blue-500"></i>
                <span id="notificationText" class="text-gray-700"></span>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
