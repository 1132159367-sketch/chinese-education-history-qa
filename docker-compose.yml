version: '3.8'

services:
  education-qa:
    build: .
    container_name: chinese-education-history-qa
    ports:
      - "8000:8000"
    volumes:
      # 挂载PDF目录，持久化数据
      - ./backend/pdfs:/app/backend/pdfs
      # 挂载环境变量文件
      - ./.env:/app/.env
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
