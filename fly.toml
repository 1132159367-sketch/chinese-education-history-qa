# fly.io 部署配置

app = "education-qa-bot"
primary_region = "sjc"

[build]
  builder = "paket"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  min_machines_running = 0

[processes]
  app = "python -m uvicorn app.main:app --host 0.0.0.0 --port 8080"

[[services]]
  http_checks = []
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[metrics]
  port = 9091
  path = "/metrics"
