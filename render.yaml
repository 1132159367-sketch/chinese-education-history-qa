services:
  - type: web
    name: education-qa-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_BASE_URL
        value: https://api.z.ai/api/anthropic
    disk:
      name: pdf-storage
      mountPath: /opt/render/project/backend/pdfs
      sizeGB: 1
